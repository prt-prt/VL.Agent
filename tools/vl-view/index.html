<!doctype html>
<meta charset="utf-8" />
<title>vl-view — agentic-vl graph viewer</title>
<!--
  vl-view — a self-contained, dependency-free force-directed viewer for the
  agentic-vl static index.

  Design: the renderer consumes a *normalized graph* { nodes, edges }. Source
  formats are converted by adapters, so the same renderer serves multiple feeds:
    - fromVlMap(index)         : a vl-map ProjectIndex JSON (static, cross-platform)
    - fromEditorSnapshot(snap) : a live EditorWatcher snapshot (future, HDE feed)
  Drop a JSON file, or it auto-loads ./sample-vl-map.json when served over http.
  No build step, no CDN — works offline and inside an HDE WebView2.
-->
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --line: #2b313b; --ink: #e6edf3;
    --muted: #8b949e; --doc: #58a6ff; --pkg: #3fb950; --lib: #d29922;
    --warn: #f85149; --accent: #bc8cff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink);
    font: 13px/1.5 ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; }
  #app { display: grid; grid-template-columns: 1fr 300px; height: 100%; }
  #stage { position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; display: block; cursor: grab; }
  svg.panning { cursor: grabbing; }
  .edge { stroke: var(--line); stroke-width: 1; }
  .edge.unresolved { stroke-dasharray: 4 3; stroke: var(--warn); opacity: .8; }
  .edge.hidden { stroke-dasharray: 3 4; opacity: .35; }
  .node circle { stroke: #0b0e13; stroke-width: 1.5; cursor: pointer; }
  .node text { fill: var(--ink); font-size: 11px; pointer-events: none;
    paint-order: stroke; stroke: #0b0e13; stroke-width: 3px; }
  .node.dim { opacity: .12; }
  .node.sel circle { stroke: #fff; stroke-width: 2.5; }
  .edge.dim { opacity: .05; }

  #side { background: var(--panel); border-left: 1px solid var(--line);
    padding: 14px 16px; overflow-y: auto; }
  h1 { font-size: 14px; margin: 0 0 2px; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: 11px; margin-bottom: 14px; }
  .stat { display: flex; justify-content: space-between; padding: 2px 0;
    color: var(--muted); }
  .stat b { color: var(--ink); font-variant-numeric: tabular-nums; }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .8px;
    color: var(--muted); margin: 18px 0 6px; }
  .legend label { display: flex; align-items: center; gap: 8px; padding: 3px 0;
    cursor: pointer; user-select: none; }
  .dot { width: 11px; height: 11px; border-radius: 50%; flex: none; }
  .legend .count { margin-left: auto; color: var(--muted); font-variant-numeric: tabular-nums; }
  #detail { font-size: 12px; }
  #detail .name { font-weight: 600; word-break: break-all; }
  #detail .kind { color: var(--accent); font-size: 11px; }
  #detail .row { color: var(--muted); margin-top: 4px; word-break: break-all; }
  #detail .chip { display: inline-block; background: #21262d; border: 1px solid var(--line);
    border-radius: 4px; padding: 1px 6px; margin: 2px 4px 2px 0; font-size: 11px; }
  #detail .chip.warn { border-color: var(--warn); color: var(--warn); }
  .hint { color: var(--muted); font-size: 11px; }
  #drop { position: absolute; inset: 0; display: none; align-items: center;
    justify-content: center; background: rgba(14,17,22,.85);
    border: 2px dashed var(--accent); color: var(--accent); font-size: 16px; z-index: 5; }
  #drop.on { display: flex; }
  .filebtn { display: inline-block; margin-top: 6px; color: var(--doc); cursor: pointer;
    text-decoration: underline; }
  input[type=file] { display: none; }
  .warnbox { border: 1px solid var(--warn); border-radius: 6px; padding: 8px 10px;
    color: var(--warn); font-size: 11px; margin-top: 8px; }
  #view-select { width: 100%; margin-bottom: 14px; background: #21262d; color: var(--ink);
    border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font: inherit; }
  #view-select:empty { display: none; }
</style>

<div id="app">
  <div id="stage">
    <svg id="svg"><g id="view">
      <g id="edges"></g><g id="nodes"></g>
    </g></svg>
    <div id="drop">drop a vl-map.json here</div>
  </div>
  <aside id="side">
    <h1>vl-view</h1>
    <div class="sub" id="root">agentic-vl static graph</div>

    <select id="view-select" title="Switch view"></select>

    <div id="stats"></div>

    <h2>Layers</h2>
    <div class="legend" id="legend"></div>

    <h2>Selected</h2>
    <div id="detail"><span class="hint">Click a node to inspect it.</span></div>

    <h2>Load</h2>
    <div class="hint">
      Run <code>vl-map --out vl-map.json</code>, then
      <label class="filebtn" for="file">open it…</label>
      <input type="file" id="file" accept=".json" />
      or drop it on the canvas.
    </div>
    <div id="warns"></div>
  </aside>
</div>

<script>
// ---------- adapters: source format -> normalized graph ----------------------

// vl-map ProjectIndex -> { nodes:[{id,label,kind,size,meta}], edges:[{from,to,kind,resolved}] }
function fromVlMap(idx) {
  const nodes = [], edges = [], seen = new Map();
  const add = (id, label, kind, size, meta) => {
    if (seen.has(id)) return seen.get(id);
    const n = { id, label, kind, size: size || 8, meta: meta || {} };
    seen.set(id, n); nodes.push(n); return n;
  };

  const conflictPkgs = new Set(
    (idx.Packages || []).filter(p => p.VersionConflict).map(p => p.Location));

  for (const d of idx.Documents || []) {
    const s = d.Stats || {};
    add('doc:' + d.Path, baseName(d.Path), 'doc',
      6 + Math.sqrt((s.Nodes || 0) + (s.Pads || 0)) * 2.2,
      { path: d.Path, kind: 'document',
        defs: (d.Definitions || []).map(x => `${x.Name} (${x.Kind})`),
        nodes: s.Nodes, pads: s.Pads, links: s.Links, pins: s.Pins,
        languageVersion: d.LanguageVersion, version: d.Version,
        warnings: d.Warnings || [] });

    for (const p of d.Nuget || []) {
      const conflict = conflictPkgs.has(p.Location);
      add('pkg:' + p.Location, p.Location, 'pkg', 10, { kind: 'package', conflict });
      edges.push({ from: 'doc:' + d.Path, to: 'pkg:' + p.Location, kind: 'uses', resolved: !conflict });
    }
    for (const lib of d.ReferencedLibraries || []) {
      add('lib:' + lib, lib, 'lib', 7, { kind: 'referenced library' });
      edges.push({ from: 'doc:' + d.Path, to: 'lib:' + lib, kind: 'refs', resolved: true });
    }
  }
  for (const e of idx.DocumentEdges || [])
    edges.push({ from: 'doc:' + e.From, to: 'doc:' + e.To, kind: 'depends', resolved: e.Resolved });

  // mark package nodes that carry a version conflict
  for (const n of nodes)
    if (n.kind === 'pkg' && conflictPkgs.has(n.label)) n.meta.conflict = true;

  return { nodes, edges, meta: { root: idx.Root, files: idx.Files, warnings: idx.Warnings || [] } };
}

function baseName(p) { const s = p.split('/').pop(); return s.replace(/\.vl$/, ''); }

// vl-map document Graph -> normalized vertex-level dataflow graph for one .vl doc
function fromVlMapPatch(idx, docPath) {
  const doc = (idx.Documents || []).find(d => d.Path === docPath);
  const g = doc && doc.Graph;
  if (!g) throw new Error('No patch graph for ' + docPath);
  const nodes = [], edges = [], have = new Set();

  for (const n of g.Nodes || []) {
    have.add(n.Id);
    const ins = (n.Pins || []).filter(p => /Input/.test(p.Kind || '')).length;
    const outs = (n.Pins || []).filter(p => /Output/.test(p.Kind || '')).length;
    nodes.push({ id: n.Id, label: n.Name || '·', kind: 'node',
      size: 6 + Math.min(8, (n.Pins || []).length),
      meta: { kind: 'node', category: n.Category, dependency: n.Dependency,
        pins: (n.Pins || []).map(p => `${p.Name || '?'} · ${p.Kind || ''}`), ins, outs } });
  }
  for (const p of g.Pads || []) {
    have.add(p.Id);
    const lbl = (p.Comment || p.Value || 'IOBox').toString();
    nodes.push({ id: p.Id, label: clip(lbl, 18), kind: 'pad', size: 6,
      meta: { kind: 'IOBox (pad)', value: p.Value, type: p.Type, comment: p.Comment } });
  }
  for (const l of g.Links || []) {
    if (!l.From || !l.To || l.From === l.To) continue;
    if (!have.has(l.From) || !have.has(l.To)) continue; // skip control-point-only edges
    edges.push({ from: l.From, to: l.To, kind: 'flow', resolved: true, hidden: !!l.Hidden,
      meta: { fromPin: l.FromPin, toPin: l.ToPin } });
  }
  return { nodes, edges, meta: { root: docPath,
    stats: { nodes: (g.Nodes || []).length, pads: (g.Pads || []).length, links: (g.Links || []).length },
    warnings: doc.Warnings || [] } };
}

function clip(s, n) { s = String(s); return s.length > n ? s.slice(0, n - 1) + '…' : s; }

// detect raw source vs already-normalized
function normalize(json) {
  if (json && Array.isArray(json.nodes) && Array.isArray(json.edges)) return json;
  if (json && (json.GeneratedBy || json.Documents)) return fromVlMap(json);
  throw new Error('Unrecognized JSON: expected a vl-map index or a normalized graph.');
}

// ---------- force-directed layout (tiny, no deps) ----------------------------

const COLORS = { doc: '#58a6ff', pkg: '#3fb950', lib: '#d29922',
  node: '#bc8cff', pad: '#f0883e', ctrl: '#6e7681' };
const KIND_LABELS = { doc: 'Documents', pkg: 'Packages', lib: 'Referenced libs',
  node: 'Nodes', pad: 'Pads / IOBoxes', ctrl: 'Control points' };

let rawIndex = null;            // last loaded vl-map index (for view switching)
let G = { nodes: [], edges: [] }, idMap = new Map(), hidden = new Set(), selected = null;
let tx = 0, ty = 0, scale = 1, alpha = 0;

const svg = document.getElementById('svg');
const viewG = document.getElementById('view');
const edgesG = document.getElementById('edges');
const nodesG = document.getElementById('nodes');

function layoutInit() {
  idMap = new Map(G.nodes.map(n => [n.id, n]));
  const R = 260;
  G.nodes.forEach((n, i) => {
    const a = (i / G.nodes.length) * Math.PI * 2;
    n.x = Math.cos(a) * R * (0.6 + 0.4 * Math.random());
    n.y = Math.sin(a) * R * (0.6 + 0.4 * Math.random());
    n.vx = 0; n.vy = 0;
  });
  G.edges.forEach(e => { e.s = idMap.get(e.from); e.t = idMap.get(e.to); });
  G.edges = G.edges.filter(e => e.s && e.t);
  alpha = 1;
}

function step() {
  const active = G.nodes.filter(n => !hidden.has(n.kind));
  const k = 0.04, repel = 9000, spring = 0.02, springLen = 90, damp = 0.86;
  for (let i = 0; i < active.length; i++) {
    const a = active[i];
    for (let j = i + 1; j < active.length; j++) {
      const b = active[j];
      let dx = a.x - b.x, dy = a.y - b.y, d2 = dx * dx + dy * dy + 0.01;
      const f = (repel * alpha) / d2, d = Math.sqrt(d2);
      const fx = (dx / d) * f, fy = (dy / d) * f;
      a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
    }
    a.vx -= a.x * k * alpha; a.vy -= a.y * k * alpha; // gravity to center
  }
  for (const e of G.edges) {
    if (hidden.has(e.s.kind) || hidden.has(e.t.kind)) continue;
    let dx = e.t.x - e.s.x, dy = e.t.y - e.s.y, d = Math.hypot(dx, dy) + 0.01;
    const f = (d - springLen) * spring * alpha;
    const fx = (dx / d) * f, fy = (dy / d) * f;
    e.s.vx += fx; e.s.vy += fy; e.t.vx -= fx; e.t.vy -= fy;
  }
  for (const n of active) {
    if (n.fixed) continue;
    n.vx *= damp; n.vy *= damp;
    n.x += n.vx; n.y += n.vy;
  }
  alpha *= 0.992;
  if (alpha < 0.02) alpha = 0.02;
}

// ---------- render -----------------------------------------------------------

function render() {
  edgesG.innerHTML = ''; nodesG.innerHTML = '';
  for (const e of G.edges) {
    if (hidden.has(e.s.kind) || hidden.has(e.t.kind)) continue;
    const l = line(e.s.x, e.s.y, e.t.x, e.t.y);
    l.setAttribute('class', 'edge' + (e.resolved === false ? ' unresolved' : '') + (e.hidden ? ' hidden' : ''));
    l.dataset.from = e.from; l.dataset.to = e.to;
    edgesG.appendChild(l);
  }
  for (const n of G.nodes) {
    if (hidden.has(n.kind)) continue;
    const g = document.createElementNS(svg.namespaceURI, 'g');
    g.setAttribute('class', 'node' + (selected === n.id ? ' sel' : ''));
    g.setAttribute('transform', `translate(${n.x},${n.y})`);
    g.dataset.id = n.id;
    const c = document.createElementNS(svg.namespaceURI, 'circle');
    c.setAttribute('r', n.size);
    c.setAttribute('fill', COLORS[n.kind] || '#888');
    if (n.meta.conflict) { c.setAttribute('stroke', 'var(--warn)'); c.setAttribute('stroke-width', '2.5'); }
    g.appendChild(c);
    if (n.size > 9 || n.kind === 'doc') {
      const t = document.createElementNS(svg.namespaceURI, 'text');
      t.setAttribute('x', n.size + 4); t.setAttribute('y', 4);
      t.textContent = n.label; g.appendChild(t);
    }
    g.addEventListener('pointerdown', ev => startDrag(ev, n));
    nodesG.appendChild(g);
  }
  applyTransform();
}

function tick() {
  for (let i = 0; i < 2; i++) step();
  positionsOnly();
  requestAnimationFrame(tick);
}
function positionsOnly() {
  for (const g of nodesG.children) {
    const n = idMap.get(g.dataset.id);
    if (n) g.setAttribute('transform', `translate(${n.x},${n.y})`);
  }
  for (const l of edgesG.children) {
    const s = idMap.get(l.dataset.from), t = idMap.get(l.dataset.to);
    if (s && t) { l.setAttribute('x1', s.x); l.setAttribute('y1', s.y);
      l.setAttribute('x2', t.x); l.setAttribute('y2', t.y); }
  }
}
function line(x1, y1, x2, y2) {
  const l = document.createElementNS(svg.namespaceURI, 'line');
  l.setAttribute('x1', x1); l.setAttribute('y1', y1);
  l.setAttribute('x2', x2); l.setAttribute('y2', y2); return l;
}
function applyTransform() { viewG.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`); }

// ---------- interaction ------------------------------------------------------

let dragNode = null, panning = false, last = null;
function startDrag(ev, n) {
  ev.stopPropagation(); dragNode = n; n.fixed = true; last = clientPt(ev);
  select(n.id); alpha = Math.max(alpha, 0.5);
  svg.setPointerCapture(ev.pointerId);
}
svg.addEventListener('pointerdown', ev => {
  if (dragNode) return; panning = true; svg.classList.add('panning'); last = { x: ev.clientX, y: ev.clientY };
});
svg.addEventListener('pointermove', ev => {
  if (dragNode) {
    const p = clientPt(ev);
    dragNode.x = p.x; dragNode.y = p.y; dragNode.vx = 0; dragNode.vy = 0;
  } else if (panning) {
    tx += ev.clientX - last.x; ty += ev.clientY - last.y;
    last = { x: ev.clientX, y: ev.clientY }; applyTransform();
  }
});
svg.addEventListener('pointerup', () => {
  if (dragNode) dragNode.fixed = false;
  dragNode = null; panning = false; svg.classList.remove('panning');
});
svg.addEventListener('wheel', ev => {
  ev.preventDefault();
  const f = ev.deltaY < 0 ? 1.1 : 1 / 1.1;
  const r = svg.getBoundingClientRect();
  const mx = ev.clientX - r.left, my = ev.clientY - r.top;
  tx = mx - (mx - tx) * f; ty = my - (my - ty) * f; scale *= f; applyTransform();
}, { passive: false });

function clientPt(ev) {
  const r = svg.getBoundingClientRect();
  return { x: (ev.clientX - r.left - tx) / scale, y: (ev.clientY - r.top - ty) / scale };
}

function select(id) {
  selected = id;
  const n = idMap.get(id);
  for (const g of nodesG.children) g.classList.toggle('sel', g.dataset.id === id);
  // neighbor highlight
  const nbrs = new Set([id]);
  for (const e of G.edges) { if (e.from === id) nbrs.add(e.to); if (e.to === id) nbrs.add(e.from); }
  for (const g of nodesG.children) g.classList.toggle('dim', !nbrs.has(g.dataset.id));
  for (const l of edgesG.children)
    l.classList.toggle('dim', !(l.dataset.from === id || l.dataset.to === id));
  renderDetail(n);
}

function renderDetail(n) {
  const d = document.getElementById('detail');
  if (!n) { d.innerHTML = '<span class="hint">Click a node to inspect it.</span>'; return; }
  const m = n.meta; let h = '';
  h += `<div class="name">${esc(n.label)}</div>`;
  h += `<div class="kind">${esc(m.kind || n.kind)}${m.conflict ? ' · version drift' : ''}</div>`;
  if (m.path) h += `<div class="row">${esc(m.path)}</div>`;
  if (m.languageVersion) h += `<div class="row">VL ${esc(m.languageVersion)} · doc ${esc(m.version || '?')}</div>`;
  if (m.nodes != null)
    h += `<div class="row">${m.nodes} nodes · ${m.pads} pads · ${m.links} links · ${m.pins} pins</div>`;
  if (m.category) h += `<div class="row">${esc(m.category)}${m.dependency ? ' · ' + esc(m.dependency) : ''}</div>`;
  if (m.ins != null) h += `<div class="row">${m.ins} in · ${m.outs} out</div>`;
  if (m.value) h += `<div class="row">value: <code>${esc(clip(m.value, 60))}</code></div>`;
  if (m.type) h += `<div class="row">type: ${esc(m.type)}</div>`;
  if (m.defs && m.defs.length)
    h += `<div class="row">${m.defs.map(x => `<span class="chip">${esc(x)}</span>`).join('')}</div>`;
  if (m.pins && m.pins.length)
    h += `<div class="row">${m.pins.map(x => `<span class="chip">${esc(x)}</span>`).join('')}</div>`;
  if (m.warnings && m.warnings.length)
    h += m.warnings.map(w => `<span class="chip warn">${esc(w)}</span>`).join('');
  // degree
  let deg = 0; for (const e of G.edges) if (e.from === n.id || e.to === n.id) deg++;
  h += `<div class="row">degree: ${deg}</div>`;
  d.innerHTML = h;
}

// ---------- chrome: stats, legend, loading -----------------------------------

function refreshChrome() {
  const counts = {};
  for (const n of G.nodes) counts[n.kind] = (counts[n.kind] || 0) + 1;
  const s = G.meta && G.meta.stats;
  document.getElementById('stats').innerHTML =
    stat('Nodes', G.nodes.length) + stat('Edges', G.edges.length) +
    (G.meta && G.meta.files
      ? stat('.vl files', G.meta.files.Vl) + stat('.cs files', G.meta.files.Cs) : '') +
    (s ? stat('Pads', s.pads) + stat('Links', s.links) : '');

  const leg = document.getElementById('legend'); leg.innerHTML = '';
  for (const k of Object.keys(KIND_LABELS)) {
    if (!(k in counts)) continue;             // only show kinds present in this view
    const row = document.createElement('label');
    row.innerHTML = `<input type="checkbox" ${hidden.has(k) ? '' : 'checked'} />
      <span class="dot" style="background:${COLORS[k]}"></span>${KIND_LABELS[k]}
      <span class="count">${counts[k] || 0}</span>`;
    row.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) hidden.delete(k); else hidden.add(k);
      alpha = Math.max(alpha, 0.4); render(); refreshChrome();
    });
    leg.appendChild(row);
  }
  const warns = document.getElementById('warns');
  warns.innerHTML = (G.meta && G.meta.warnings && G.meta.warnings.length)
    ? `<div class="warnbox">⚠ ${G.meta.warnings.map(esc).join('<br>')}</div>` : '';
  if (G.meta && G.meta.root) document.getElementById('root').textContent = G.meta.root;
}
function stat(k, v) { return `<div class="stat"><span>${k}</span><b>${v ?? '–'}</b></div>`; }

// populate the view switcher: project overview + one entry per document with a patch graph
function buildViewMenu() {
  const sel = document.getElementById('view-select');
  sel.innerHTML = '';
  const add = (val, text) => { const o = document.createElement('option'); o.value = val; o.textContent = text; sel.appendChild(o); };
  add('project', 'Project · documents & packages');
  if (rawIndex && rawIndex.Documents) {
    const docs = rawIndex.Documents
      .filter(d => d.Graph && (d.Graph.Nodes || []).length)
      .sort((a, b) => (b.Graph.Nodes.length) - (a.Graph.Nodes.length));
    for (const d of docs)
      add('patch:' + d.Path, `Patch · ${baseName(d.Path)}  (${d.Graph.Nodes.length}n)`);
  }
  sel.onchange = () => setView(sel.value);
}

function setView(key) {
  try {
    if (key === 'project') G = fromVlMap(rawIndex);
    else if (key.startsWith('patch:')) G = fromVlMapPatch(rawIndex, key.slice(6));
    else return;
  } catch (e) { alert(e.message); return; }
  hidden.clear(); selected = null;
  layoutInit(); render(); refreshChrome();
  renderDetail(null);
  tx = svg.clientWidth / 2; ty = svg.clientHeight / 2; scale = 1; applyTransform();
}

function load(json) {
  // raw vl-map index -> keep it and offer per-document views; otherwise render as-is
  if (json && (json.GeneratedBy || json.Documents)) {
    rawIndex = json; buildViewMenu(); setView('project'); return;
  }
  try { G = normalize(json); }
  catch (e) { alert(e.message); return; }
  rawIndex = null; document.getElementById('view-select').innerHTML = '';
  hidden.clear(); selected = null;
  layoutInit(); render(); refreshChrome();
  tx = svg.clientWidth / 2; ty = svg.clientHeight / 2; scale = 1; applyTransform();
}

// drag & drop
const drop = document.getElementById('drop');
['dragenter', 'dragover'].forEach(ev => document.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.add('on'); }));
['dragleave', 'drop'].forEach(ev => document.addEventListener(ev, e => {
  e.preventDefault(); if (ev !== 'drop' && e.relatedTarget) return; drop.classList.remove('on'); }));
document.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0]; if (f) readFile(f);
});
document.getElementById('file').addEventListener('change', e => {
  if (e.target.files[0]) readFile(e.target.files[0]);
});
function readFile(f) {
  const r = new FileReader();
  r.onload = () => { try { load(JSON.parse(r.result)); } catch (e) { alert('Bad JSON: ' + e.message); } };
  r.readAsText(f);
}
function esc(s) { return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
