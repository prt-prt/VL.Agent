name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    name: tools smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Check packaging scripts
        run: bash -n scripts/publish-tools.sh

      - name: Build vl-probe
        run: dotnet build src/VL.Agent.Probe/VL.Agent.Probe.csproj -c Release

      - name: Run smoke test
        run: DOTNET=dotnet tests/smoke-tools.sh
